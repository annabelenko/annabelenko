<svg width="100%" height="120" viewBox="0 0 1000 120" xmlns="http://www.w3.org/2000/svg">
<style>
:root { --s: #000; }
@media (prefers-color-scheme: dark) { :root { --s: #fff; } }
.stk { stroke: var(--s); stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; fill: none; }
.hd  { fill: var(--s); stroke: none; }

/* Ground line */
.ground { stroke: var(--s); stroke-width: 1; opacity: 0.15; }

/* The whole figure travels left→right, flips, comes back */
.world {
  animation: travel 18s linear infinite;
}
@keyframes travel {
  0%   { transform: translateX(-30px)  scaleX(1);  }
  47%  { transform: translateX(980px)  scaleX(1);  }
  50%  { transform: translateX(980px)  scaleX(-1); }
  97%  { transform: translateX(-30px)  scaleX(-1); }
  100% { transform: translateX(-30px)  scaleX(1);  }
}

/* Body vertical: idles, jumps, cartwheels */
.body {
  transform-origin: 20px 58px;
  animation: bodyAct 18s linear infinite;
}
@keyframes bodyAct {
  /* walk */
  0%,  12%  { transform: translateY(0)    rotate(0deg);   }
  /* jump up */
  13%        { transform: translateY(-28px) rotate(0deg);   }
  14%        { transform: translateY(-32px) rotate(0deg);   }
  15%        { transform: translateY(-28px) rotate(0deg);   }
  16%, 25%  { transform: translateY(0)    rotate(0deg);   }
  /* cartwheel */
  26%        { transform: translateY(0)    rotate(0deg);   }
  31%        { transform: translateY(0)    rotate(360deg); }
  32%, 65%  { transform: translateY(0)    rotate(0deg);   }
  /* jump (return trip) */
  66%        { transform: translateY(-28px) rotate(0deg);   }
  67%        { transform: translateY(-32px) rotate(0deg);   }
  68%        { transform: translateY(-28px) rotate(0deg);   }
  69%, 79%  { transform: translateY(0)    rotate(0deg);   }
  /* cartwheel (return trip) */
  80%        { transform: translateY(0)    rotate(0deg);   }
  85%        { transform: translateY(0)    rotate(-360deg);}
  86%, 100% { transform: translateY(0)    rotate(0deg);   }
}

/* Legs swing opposite phase */
.leg1 {
  transform-origin: 20px 58px;
  animation: legA 0.55s ease-in-out infinite;
}
.leg2 {
  transform-origin: 20px 58px;
  animation: legB 0.55s ease-in-out infinite;
}
@keyframes legA {
  0%, 100% { transform: rotate(-28deg); }
  50%      { transform: rotate( 28deg); }
}
@keyframes legB {
  0%, 100% { transform: rotate( 28deg); }
  50%      { transform: rotate(-28deg); }
}

/* Knee bend — lower leg swings opposite to upper */
.shin1 {
  transform-origin: 20px 72px;
  animation: shinA 0.55s ease-in-out infinite;
}
.shin2 {
  transform-origin: 20px 72px;
  animation: shinB 0.55s ease-in-out infinite;
}
@keyframes shinA {
  0%, 100% { transform: rotate( 12deg); }
  50%      { transform: rotate(-12deg); }
}
@keyframes shinB {
  0%, 100% { transform: rotate(-12deg); }
  50%      { transform: rotate( 12deg); }
}

/* Arms swing opposite to same-side leg */
.arm1 {
  transform-origin: 20px 44px;
  animation: armA 0.55s ease-in-out infinite;
}
.arm2 {
  transform-origin: 20px 44px;
  animation: armB 0.55s ease-in-out infinite;
}
@keyframes armA {
  0%, 100% { transform: rotate( 32deg); }
  50%      { transform: rotate(-32deg); }
}
@keyframes armB {
  0%, 100% { transform: rotate(-32deg); }
  50%      { transform: rotate( 32deg); }
}

/* Forearm bend */
.fore1 {
  transform-origin: 20px 54px;
  animation: foreA 0.55s ease-in-out infinite;
}
.fore2 {
  transform-origin: 20px 54px;
  animation: foreB 0.55s ease-in-out infinite;
}
@keyframes foreA {
  0%, 100% { transform: rotate(-15deg); }
  50%      { transform: rotate( 15deg); }
}
@keyframes foreB {
  0%, 100% { transform: rotate( 15deg); }
  50%      { transform: rotate(-15deg); }
}

/* Subtle body bob */
.bob {
  animation: bobY 0.55s ease-in-out infinite;
}
@keyframes bobY {
  0%, 100% { transform: translateY(0px);  }
  50%      { transform: translateY(-2px); }
}
</style>

<!-- ground -->
<line class="ground" x1="0" y1="98" x2="1000" y2="98"/>

<g class="world">
  <g class="body">
    <g class="bob">

      <!-- HEAD -->
      <circle class="hd" cx="20" cy="24" r="8"/>

      <!-- TORSO -->
      <line class="stk" x1="20" y1="32" x2="20" y2="58"/>

      <!-- ARM 1 (front) -->
      <g class="arm1">
        <line class="stk" x1="20" y1="38" x2="20" y2="54"/>
        <g class="fore1">
          <line class="stk" x1="20" y1="54" x2="20" y2="66"/>
        </g>
      </g>

      <!-- ARM 2 (back) -->
      <g class="arm2">
        <line class="stk" x1="20" y1="38" x2="20" y2="54"/>
        <g class="fore2">
          <line class="stk" x1="20" y1="54" x2="20" y2="66"/>
        </g>
      </g>

      <!-- LEG 1 (front) -->
      <g class="leg1">
        <line class="stk" x1="20" y1="58" x2="20" y2="74"/>
        <g class="shin1">
          <line class="stk" x1="20" y1="74" x2="20" y2="90"/>
        </g>
      </g>

      <!-- LEG 2 (back) -->
      <g class="leg2">
        <line class="stk" x1="20" y1="58" x2="20" y2="74"/>
        <g class="shin2">
          <line class="stk" x1="20" y1="74" x2="20" y2="90"/>
        </g>
      </g>

    </g>
  </g>
</g>
</svg>
