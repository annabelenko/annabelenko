<svg width="100%" height="100" viewBox="0 0 1000 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root { --stroke: #000; }
    @media (prefers-color-scheme: dark) { :root { --stroke: #fff; } }
    .stk { stroke: var(--stroke); stroke-width: 3; stroke-linecap: round; fill: none; }
    .world { animation: travel 20s linear infinite; }
    @keyframes travel {
      0% { transform: translateX(0px) scaleX(1); }
      48% { transform: translateX(900px) scaleX(1); }
      50% { transform: translateX(900px) scaleX(-1); }
      98% { transform: translateX(0px) scaleX(-1); }
      100% { transform: translateX(0px) scaleX(1); }
    }
    .man-body { transform-origin: 20px 50px; animation: action 20s linear infinite; }
    @keyframes action {
      0%, 15% { transform: translateY(0) rotate(0deg); }
      16% { transform: translateY(-30px) rotate(0deg); } /* Jump */
      18%, 30% { transform: translateY(0) rotate(0deg); }
      32% { transform: translateY(0) rotate(360deg); } /* Cartwheel */
      35%, 65% { transform: translateY(0) rotate(0deg); }
      66% { transform: translateY(-30px) rotate(0deg); } /* Jump back */
      68%, 82% { transform: translateY(0) rotate(0deg); }
      84% { transform: translateY(0) rotate(-360deg); } /* Cartwheel back */
      87%, 100% { transform: translateY(0) rotate(0deg); }
    }
    .leg1 { animation: walk1 0.8s ease-in-out infinite; transform-origin: 20px 60px; }
    .leg2 { animation: walk2 0.8s ease-in-out infinite; transform-origin: 20px 60px; }
    @keyframes walk1 { 0%, 100% { transform: rotate(-25deg); } 50% { transform: rotate(25deg); } }
    @keyframes walk2 { 0%, 100% { transform: rotate(25deg); } 50% { transform: rotate(-25deg); } }
  </style>
  <g class="world">
    <g class="man-body">
      <circle cx="20" cy="30" r="7" class="stk" /> <line x1="20" y1="37" x2="20" y2="60" class="stk" /> <line x1="20" y1="60" x2="20" y2="85" class="stk leg1" /> <line x1="20" y1="60" x2="20" y2="85" class="stk leg2" /> </g>
  </g>
</svg>
